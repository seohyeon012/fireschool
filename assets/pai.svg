<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 160">
  <defs>
    <radialGradient id="skin" cx="45%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="#FFE0BE"/>
      <stop offset="100%" stop-color="#FFBB88"/>
    </radialGradient>
    <radialGradient id="helmet" cx="35%" cy="25%" r="65%">
      <stop offset="0%"   stop-color="#FFE84A"/>
      <stop offset="60%"  stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#CC8800"/>
    </radialGradient>
    <radialGradient id="iris" cx="38%" cy="28%" r="60%">
      <stop offset="0%"   stop-color="#6B3800"/>
      <stop offset="100%" stop-color="#1A0600"/>
    </radialGradient>
    <linearGradient id="jacket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E83000"/>
      <stop offset="100%" stop-color="#AA1000"/>
    </linearGradient>
    <linearGradient id="pants" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1E4280"/>
      <stop offset="100%" stop-color="#0E2550"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="50" cy="157" rx="28" ry="4" fill="rgba(0,0,0,0.22)"/>

  <!-- BOOTS -->
  <rect x="27" y="128" width="19" height="26" rx="8" fill="#181818"/>
  <rect x="54" y="128" width="19" height="26" rx="8" fill="#181818"/>
  <ellipse cx="36"  cy="153" rx="12" ry="5.5" fill="#101010"/>
  <ellipse cx="63"  cy="153" rx="12" ry="5.5" fill="#101010"/>
  <rect x="29" y="130" width="7"  height="13" rx="3.5" fill="rgba(255,255,255,0.10)"/>
  <rect x="56" y="130" width="7"  height="13" rx="3.5" fill="rgba(255,255,255,0.10)"/>

  <!-- PANTS -->
  <rect x="25" y="97" width="50" height="35" rx="6" fill="url(#pants)"/>
  <line x1="50" y1="97" x2="50" y2="130" stroke="#0A1D44" stroke-width="1.5"/>
  <rect x="29" y="107" width="14" height="11" rx="3" fill="none" stroke="#0A1D44" stroke-width="1.5"/>

  <!-- BELT -->
  <rect x="25" y="92" width="50" height="9" rx="4.5" fill="#7A5010"/>
  <rect x="41" y="92" width="18" height="9" rx="3"   fill="#C4A030"/>
  <rect x="44" y="93" width="12" height="7" rx="2"   fill="#7A5010"/>

  <!-- JACKET BODY -->
  <rect x="16" y="57" width="68" height="40" rx="13" fill="url(#jacket)"/>
  <rect x="46" y="59" width="8"  height="37" rx="4"  fill="#990A00"/>
  <!-- Reflective stripe -->
  <rect x="16" y="72" width="68" height="8"  rx="3"  fill="#FFD700"/>
  <rect x="16" y="83" width="68" height="5"  rx="2"  fill="rgba(255,215,0,0.50)"/>

  <!-- ARMS -->
  <rect x="1"  y="57" width="18" height="40" rx="9" fill="url(#jacket)"/>
  <rect x="81" y="57" width="18" height="40" rx="9" fill="url(#jacket)"/>
  <rect x="1"  y="72" width="18" height="8"  rx="3" fill="#FFD700"/>
  <rect x="81" y="72" width="18" height="8"  rx="3" fill="#FFD700"/>

  <!-- GLOVES -->
  <ellipse cx="10"  cy="101" rx="11" ry="8.5" fill="#990A00"/>
  <ellipse cx="90"  cy="101" rx="11" ry="8.5" fill="#990A00"/>
  <rect x="3"  y="93" width="8" height="13" rx="4" fill="#BB1200"/>
  <rect x="12" y="92" width="8" height="13" rx="4" fill="#BB1200"/>
  <rect x="80" y="93" width="8" height="13" rx="4" fill="#BB1200"/>
  <rect x="89" y="92" width="8" height="13" rx="4" fill="#BB1200"/>

  <!-- BADGE -->
  <circle cx="30" cy="67" r="8.5" fill="#FFD700"/>
  <circle cx="30" cy="67" r="7"   fill="#CC1800"/>
  <path d="M30 62 Q33.5 65.5 32 69.5 Q34.5 67 33.5 71.5 Q30 69.5 26.5 71.5 Q25.5 67 28 69.5 Q26.5 65.5 30 62Z" fill="#FFD700"/>

  <!-- NECK -->
  <rect x="40" y="47" width="20" height="15" rx="8" fill="url(#skin)"/>

  <!-- EARS -->
  <circle cx="15" cy="31" r="8.5" fill="url(#skin)"/>
  <circle cx="15" cy="31" r="5.5" fill="#FFAA77"/>
  <circle cx="85" cy="31" r="8.5" fill="url(#skin)"/>
  <circle cx="85" cy="31" r="5.5" fill="#FFAA77"/>

  <!-- HEAD -->
  <circle cx="50" cy="29" r="33" fill="url(#skin)"/>

  <!-- Hair under helmet -->
  <path d="M18 34 Q15 40 18 47" stroke="#3A1800" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M82 34 Q85 40 82 47" stroke="#3A1800" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- HELMET -->
  <path d="M17 33 Q15 3 50 1 Q85 3 83 33 Z" fill="url(#helmet)"/>
  <path d="M24 18 Q40 9 60 12" stroke="rgba(255,255,255,0.52)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- HELMET BRIM -->
  <path d="M13 34 Q50 47 87 34 L84 40 Q50 53 16 40 Z" fill="#CC8800"/>
  <path d="M17 36 Q50 47 83 36" stroke="rgba(255,255,180,0.40)" stroke-width="1.5" fill="none"/>

  <!-- VISOR -->
  <path d="M29 17 Q50 12 71 17 Q71 30 50 34 Q29 30 29 17Z"
        fill="rgba(170,220,255,0.22)" stroke="#BB7700" stroke-width="1.5"/>
  <path d="M33 19 Q48 15 58 18" stroke="rgba(255,255,255,0.58)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 119 -->
  <text x="50" y="28" text-anchor="middle" font-size="9.5" font-weight="900"
        fill="#CC1800" font-family="Arial,sans-serif" letter-spacing="1">119</text>

  <!-- SCLERA -->
  <ellipse cx="36" cy="33" rx="10"  ry="11"  fill="white"/>
  <ellipse cx="64" cy="33" rx="10"  ry="11"  fill="white"/>
  <ellipse cx="36" cy="33" rx="10"  ry="11"  fill="none" stroke="#DDB080" stroke-width="0.7"/>
  <ellipse cx="64" cy="33" rx="10"  ry="11"  fill="none" stroke="#DDB080" stroke-width="0.7"/>

  <!-- IRIS -->
  <circle cx="37" cy="34" r="7" fill="url(#iris)"/>
  <circle cx="65" cy="34" r="7" fill="url(#iris)"/>

  <!-- PUPIL -->
  <circle cx="38" cy="35" r="4.2" fill="#080202"/>
  <circle cx="66" cy="35" r="4.2" fill="#080202"/>

  <!-- HIGHLIGHTS -->
  <circle cx="40.5" cy="32"  r="2.4" fill="white"/>
  <circle cx="68.5" cy="32"  r="2.4" fill="white"/>
  <circle cx="36"   cy="38"  r="1.1" fill="rgba(255,255,255,0.42)"/>
  <circle cx="64"   cy="38"  r="1.1" fill="rgba(255,255,255,0.42)"/>

  <!-- EYEBROWS -->
  <path d="M27 23 Q36.5 17 46 22" stroke="#3A1800" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M54 22 Q63.5 17 73 23" stroke="#3A1800" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- NOSE -->
  <ellipse cx="50" cy="44" rx="3.8" ry="2.8" fill="#E08840"/>
  <ellipse cx="49" cy="43" rx="1.5" ry="1.1" fill="rgba(255,255,255,0.48)"/>

  <!-- MOUTH -->
  <path d="M38 52 Q50 63 62 52" stroke="#CC5533" stroke-width="2.8"
        fill="#FF7755" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M42 54 Q50 61 58 54" fill="white"/>
  <line x1="42" y1="54" x2="58" y2="54" stroke="#CC5533" stroke-width="0.8"/>

  <!-- CHEEKS -->
  <ellipse cx="21" cy="46" rx="10" ry="6.5" fill="#FFB0A0" opacity="0.48"/>
  <ellipse cx="79" cy="46" rx="10" ry="6.5" fill="#FFB0A0" opacity="0.48"/>
</svg>
