<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 115">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF4422"/>
      <stop offset="100%" stop-color="#AA1100"/>
    </linearGradient>
    <linearGradient id="cab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#EE3311"/>
      <stop offset="100%" stop-color="#991100"/>
    </linearGradient>
    <radialGradient id="wheel" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#555"/>
      <stop offset="50%"  stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="glass" cx="30%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="rgba(200,235,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(100,160,220,0.25)"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="110" cy="111" rx="100" ry="6" fill="rgba(0,0,0,0.28)"/>

  <!-- ── BODY ── -->
  <rect x="22" y="34" width="178" height="58" rx="5" fill="url(#body)"/>

  <!-- Gold trim line top -->
  <rect x="22" y="34" width="178" height="4" rx="2" fill="#FFD700" opacity="0.7"/>
  <!-- Reflective side stripe -->
  <rect x="22" y="73" width="178" height="6" rx="2" fill="#FFD700" opacity="0.85"/>
  <!-- Light stripe below -->
  <rect x="22" y="50" width="178" height="2" fill="rgba(255,255,255,0.22)"/>

  <!-- Equipment compartments -->
  <rect x="88"  y="37" width="36" height="52" rx="2" fill="#990A00"/>
  <rect x="126" y="37" width="32" height="52" rx="2" fill="#990A00"/>
  <rect x="160" y="37" width="37" height="52" rx="2" fill="#990A00"/>
  <!-- Compartment door panels -->
  <rect x="90"  y="39" width="32" height="48" rx="2" fill="#BB1400"/>
  <rect x="128" y="39" width="28" height="48" rx="2" fill="#BB1400"/>
  <rect x="162" y="39" width="33" height="48" rx="2" fill="#BB1400"/>
  <!-- Compartment handles -->
  <rect x="103" y="60" width="4" height="10" rx="2" fill="#FFD700"/>
  <rect x="139" y="60" width="4" height="10" rx="2" fill="#FFD700"/>
  <rect x="175" y="60" width="4" height="10" rx="2" fill="#FFD700"/>
  <!-- Compartment hinge lines -->
  <line x1="88"  y1="63" x2="124" y2="63" stroke="#770800" stroke-width="1"/>
  <line x1="126" y1="63" x2="158" y2="63" stroke="#770800" stroke-width="1"/>
  <line x1="160" y1="63" x2="197" y2="63" stroke="#770800" stroke-width="1"/>

  <!-- WATER TANK on top rear -->
  <rect x="120" y="18" width="78" height="18" rx="6" fill="#CC1600"/>
  <rect x="122" y="20" width="74" height="14" rx="5" fill="#DD2200"/>
  <rect x="122" y="20" width="74" height="5"  rx="3" fill="rgba(255,255,255,0.12)"/>
  <!-- Tank bands -->
  <line x1="158" y1="20" x2="158" y2="34" stroke="#AA1000" stroke-width="2"/>
  <circle cx="127" cy="27" r="2.5" fill="#881000"/>
  <circle cx="191" cy="27" r="2.5" fill="#881000"/>

  <!-- LADDER SYSTEM top -->
  <rect x="24" y="21" width="92" height="4.5" rx="2" fill="#999"/>
  <rect x="24" y="30" width="92" height="4.5" rx="2" fill="#999"/>
  <!-- Rungs -->
  <line x1="36"  y1="21" x2="36"  y2="35" stroke="#777" stroke-width="2"/>
  <line x1="49"  y1="21" x2="49"  y2="35" stroke="#777" stroke-width="2"/>
  <line x1="62"  y1="21" x2="62"  y2="35" stroke="#777" stroke-width="2"/>
  <line x1="75"  y1="21" x2="75"  y2="35" stroke="#777" stroke-width="2"/>
  <line x1="88"  y1="21" x2="88"  y2="35" stroke="#777" stroke-width="2"/>
  <line x1="101" y1="21" x2="101" y2="35" stroke="#777" stroke-width="2"/>
  <line x1="114" y1="21" x2="114" y2="35" stroke="#777" stroke-width="2"/>
  <!-- Ladder mount blocks -->
  <rect x="22"  y="33" width="12" height="7" rx="2" fill="#666"/>
  <rect x="108" y="33" width="12" height="7" rx="2" fill="#666"/>

  <!-- SIREN LIGHT BAR top of cab -->
  <rect x="38" y="10" width="52" height="11" rx="5.5" fill="#2A2A2A"/>
  <rect x="40" y="11" width="48" height="9"  rx="4.5" fill="#111"/>
  <!-- Red light -->
  <circle cx="52"  cy="15.5" r="5.5" fill="#FF1111"/>
  <circle cx="52"  cy="15.5" r="3"   fill="#FF6666"/>
  <!-- Blue light -->
  <circle cx="76"  cy="15.5" r="5.5" fill="#1133FF"/>
  <circle cx="76"  cy="15.5" r="3"   fill="#5577FF"/>
  <!-- White center -->
  <circle cx="64"  cy="15.5" r="3.5" fill="white"/>

  <!-- ── CAB ── -->
  <!-- Cab body -->
  <rect x="2" y="19" width="76" height="73" rx="9" fill="url(#cab)"/>
  <!-- Cab roof curve -->
  <path d="M2 27 Q4 16 22 13 L76 13 Q83 13 78 27" fill="#BB1400"/>
  <rect x="2" y="11" width="76" height="14" rx="7" fill="#AA1200"/>

  <!-- WINDSHIELD -->
  <path d="M9 23 L9 53 Q9 59 15 59 L68 59 Q74 59 74 53 L74 23 Q62 13 22 13 Z"
        fill="url(#glass)" stroke="#881000" stroke-width="1.5"/>
  <!-- Windshield reflection -->
  <path d="M15 22 Q34 15 55 17" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M15 27 Q30 22 45 24" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Wiper -->
  <line x1="22" y1="57" x2="52" y2="51" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- CAB DOOR -->
  <rect x="4"  y="61" width="44" height="29" rx="5" fill="#BB1200"/>
  <!-- Door window -->
  <rect x="7"  y="63" width="38" height="17" rx="3"
        fill="rgba(150,200,255,0.32)" stroke="#881000" stroke-width="1"/>
  <path d="M9 64 Q26 61 43 64" stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none"/>
  <!-- Door handle -->
  <rect x="44" y="73" width="4" height="9" rx="2" fill="#FFD700"/>

  <!-- 소방 text on door -->
  <text x="25" y="84" text-anchor="middle" font-size="8.5" font-weight="900"
        fill="#FFD700" font-family="Arial,sans-serif" letter-spacing="2">소방</text>

  <!-- 119 on cab side -->
  <text x="60" y="84" text-anchor="middle" font-size="11" font-weight="900"
        fill="white" font-family="Arial,sans-serif">119</text>

  <!-- HEADLIGHT -->
  <rect x="2"  y="36" width="9"  height="14" rx="2.5" fill="#FFFACC"/>
  <ellipse cx="6" cy="43" rx="4.5" ry="7" fill="rgba(255,250,160,0.5)"/>
  <!-- Fog light -->
  <rect x="2"  y="53" width="9"  height="9"  rx="2"   fill="#FFEEAA"/>

  <!-- GRILLE -->
  <rect x="2"  y="63" width="5"  height="18" rx="1.5" fill="#333"/>
  <line x1="2" y1="67" x2="7" y2="67" stroke="#555" stroke-width="1"/>
  <line x1="2" y1="71" x2="7" y2="71" stroke="#555" stroke-width="1"/>
  <line x1="2" y1="75" x2="7" y2="75" stroke="#555" stroke-width="1"/>

  <!-- Bumper -->
  <rect x="1"  y="81" width="12" height="8"  rx="3"   fill="#888"/>
  <rect x="2"  y="82" width="10" height="6"  rx="2"   fill="#AAA"/>

  <!-- Mirror -->
  <rect x="-3" y="30" width="10" height="7"  rx="2"   fill="#CC1200"/>
  <rect x="-2" y="31" width="6"  height="5"  rx="1"   fill="rgba(150,200,255,0.5)"/>

  <!-- ── WHEELS ── -->
  <!-- Front wheel -->
  <circle cx="45"  cy="97" r="18" fill="#0A0A0A"/>
  <circle cx="45"  cy="97" r="14" fill="url(#wheel)"/>
  <circle cx="45"  cy="97" r="8"  fill="#444"/>
  <circle cx="45"  cy="97" r="4"  fill="#2A2A2A"/>
  <!-- Wheel bolts front -->
  <circle cx="45"  cy="84" r="2.2" fill="#777"/>
  <circle cx="56"  cy="90" r="2.2" fill="#777"/>
  <circle cx="56"  cy="104" r="2.2" fill="#777"/>
  <circle cx="45"  cy="110" r="2.2" fill="#777"/>
  <circle cx="34"  cy="104" r="2.2" fill="#777"/>
  <circle cx="34"  cy="90"  r="2.2" fill="#777"/>
  <!-- Wheel arch front -->
  <path d="M27 92 Q45 73 63 92" fill="#AA1000" stroke="#CC1800" stroke-width="1"/>

  <!-- Rear wheel -->
  <circle cx="170" cy="97" r="18" fill="#0A0A0A"/>
  <circle cx="170" cy="97" r="14" fill="url(#wheel)"/>
  <circle cx="170" cy="97" r="8"  fill="#444"/>
  <circle cx="170" cy="97" r="4"  fill="#2A2A2A"/>
  <!-- Wheel bolts rear -->
  <circle cx="170" cy="84"  r="2.2" fill="#777"/>
  <circle cx="181" cy="90"  r="2.2" fill="#777"/>
  <circle cx="181" cy="104" r="2.2" fill="#777"/>
  <circle cx="170" cy="110" r="2.2" fill="#777"/>
  <circle cx="159" cy="104" r="2.2" fill="#777"/>
  <circle cx="159" cy="90"  r="2.2" fill="#777"/>
  <!-- Wheel arch rear -->
  <path d="M152 92 Q170 73 188 92" fill="#AA1000" stroke="#CC1800" stroke-width="1"/>

  <!-- Undercarriage -->
  <rect x="10"  y="89" width="200" height="7" rx="3" fill="#550000"/>

  <!-- Running board -->
  <rect x="60"  y="82" width="88" height="6" rx="3" fill="#444"/>
  <line x1="72"  y1="82" x2="72"  y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="84"  y1="82" x2="84"  y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="96"  y1="82" x2="96"  y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="108" y1="82" x2="108" y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="82" x2="120" y2="88" stroke="#333" stroke-width="1.5"/>
  <line x1="132" y1="82" x2="132" y2="88" stroke="#333" stroke-width="1.5"/>

  <!-- HOSE REEL at back -->
  <circle cx="205" cy="67" r="14" fill="#AA1000" stroke="#CC2000" stroke-width="2"/>
  <circle cx="205" cy="67" r="10" fill="#BB1800"/>
  <circle cx="205" cy="67" r="5"  fill="#990A00"/>
  <circle cx="205" cy="67" r="2.5" fill="#FF3300"/>
  <path d="M205 53 Q210 44 204 38" stroke="#775500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
